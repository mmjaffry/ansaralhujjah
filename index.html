<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ansar Al-Hujjah</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent-light: rgb(230,140,95);
      --accent-mid: rgb(180,90,45);
      --accent-dark: rgb(130,40,0);
      --accent-glow: rgb(255,170,125);
      --bg: #080808;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.08);
      --text: #F0EDE8;
      --text-muted: rgba(180,90,45,0.6);
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: "Lato", sans-serif; font-weight: 300; }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(180,90,45,0.16) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(150,60,15,0.10) 0%, transparent 60%),
        #080808;
      display: flex; flex-direction: column; align-items: center; padding: 60px 20px 80px;
    }
    .container { width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; }
    .logo-wrap {
      width: 110px; height: 110px; border-radius: 50%; overflow: hidden;
      border: 2px solid rgba(180,90,45,0.4);
      box-shadow: 0 0 30px rgba(180,90,45,0.22), 0 0 60px rgba(180,90,45,0.08);
      margin-bottom: 28px; animation: fadeDown 0.7s ease both;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }
    h1 {
      font-family: "Cinzel", serif; font-size: 1.85rem; font-weight: 600;
      letter-spacing: 0.08em; text-align: center;
      background: linear-gradient(135deg, var(--accent-glow) 0%, var(--accent-light) 50%, var(--accent-mid) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 18px; animation: fadeDown 0.7s 0.1s ease both;
    }
    .divider {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent-mid), transparent);
      margin-bottom: 32px; animation: fadeIn 0.7s 0.2s ease both;
    }
    .links { width: 100%; display: flex; flex-direction: column; gap: 14px; }
    .link-btn {
      display: flex; align-items: center; gap: 16px; width: 100%;
      padding: 16px 22px;
      background: var(--bg-card);
      border: 1px solid rgba(180,90,45,0.2);
      border-radius: 12px; text-decoration: none; color: var(--text);
      font-family: "Lato", sans-serif; font-weight: 400; font-size: 0.95rem;
      letter-spacing: 0.03em; cursor: pointer;
      transition: background 0.25s, border-color 0.25s, transform 0.2s, box-shadow 0.25s;
      position: relative; overflow: hidden;
      animation: fadeUp 0.6s ease both;
    }
    .link-btn::before {
      content: ""; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(180,90,45,0.08), transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .link-btn:hover { background: var(--bg-card-hover); border-color: rgba(180,90,45,0.5); transform: translateY(-2px); box-shadow: 0 6px 24px rgba(180,90,45,0.13); }
    .link-btn:hover::before { opacity: 1; }
    .link-btn:active { transform: translateY(0); }
    .icon {
      width: 36px; height: 36px; border-radius: 8px;
      background: rgba(180,90,45,0.12);
      border: 1px solid rgba(180,90,45,0.25);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .icon svg { width: 18px; height: 18px; fill: var(--accent-light); }
    .btn-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .btn-label { font-size: 0.95rem; color: var(--text); }
    .btn-sub { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.04em; }
    .arrow { color: var(--accent-dark); font-size: 1rem; transition: transform 0.2s, color 0.2s; }
    .link-btn:hover .arrow { transform: translateX(4px); color: var(--accent-light); }
    footer { margin-top: 52px; font-size: 0.72rem; color: rgba(180,90,45,0.3); letter-spacing: 0.1em; text-transform: uppercase; animation: fadeIn 1s 0.8s ease both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
