<!--
  _head.html — Shared head elements for Ansar Al-Hujjah
  Copy the block below into the <head> of any page in this project.
  Keep this file as the single source of truth for meta, favicon, and fonts.
-->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />

<!-- Open Graph -->
<meta property="og:title" content="Ansar Al-Hujjah" />
<meta property="og:description" content="Ansar Al-Hujjah · Houston, TX" />
<meta property="og:image" content="https://ansaralhujjah.org/icons/og-image.png" />
<meta property="og:url" content="https://ansaralhujjah.org" />
<meta property="og:type" content="website" />

<!-- Favicons -->
<link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet">
