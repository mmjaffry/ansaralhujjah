  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent-light: rgb(195,95,38);
      --accent-mid:   rgb(148,62,12);
      --accent-dark:  rgb(98,28,0);
      --bg:           #d9ccbc;
      --bg-card:      rgba(255,255,255,0.48);
      --text:         #1a0d05;
      --text-muted:   rgba(110,55,12,0.72);
    }
    html, body {
      min-height: 100vh; background: var(--bg);
      color: var(--text); font-family: "Lato", sans-serif; font-weight: 300;
    }
    body {
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(148,62,12,0.10) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 80% 80%, rgba(120,50,8,0.07) 0%, transparent 60%),
        #d9ccbc;
      display: flex; flex-direction: column; align-items: center;
      padding: 48px 20px 80px;
    }
    .container { width: 100%; max-width: 620px; }

    /* ── Nav ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 0.82rem; letter-spacing: 0.06em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      margin-bottom: 36px;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent-mid); }
    .back-link svg { width: 14px; height: 14px; fill: currentColor; }

    /* ── Header ── */
    .program-header { text-align: center; margin-bottom: 32px; }
    .program-header h1 {
      font-family: "Cinzel", serif; font-size: 1.9rem; font-weight: 600;
      letter-spacing: 0.07em;
      background: linear-gradient(135deg, rgb(160,70,10) 0%, rgb(110,38,0) 50%, rgb(75,18,0) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px;
    }
    .program-header .subtitle {
      font-size: 0.88rem; color: var(--text-muted); letter-spacing: 0.04em;
    }
    .divider {
      width: 60px; height: 1px; margin: 20px auto 0;
      background: linear-gradient(90deg, transparent, var(--accent-mid), transparent);
    }

    /* ── Flyer ── */
    .program-flyer {
      width: 100%; border-radius: 16px; overflow: hidden;
      border: 1px solid rgba(180,90,45,0.2);
      margin-bottom: 28px;
      box-shadow: 0 4px 24px rgba(148,62,12,0.12);
    }
    .program-flyer img { width: 100%; display: block; }
    .program-flyer-placeholder {
      width: 100%; height: 240px; border-radius: 16px;
      background: rgba(148,62,12,0.07);
      border: 1px solid rgba(180,90,45,0.2);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 28px;
    }
    .program-flyer-placeholder svg { width: 64px; height: 64px; fill: var(--accent-mid); opacity: 0.25; }

    /* ── Description ── */
    .program-desc {
      background: var(--bg-card); border: 1px solid rgba(180,90,45,0.18);
      border-radius: 16px; padding: 24px 28px; margin-bottom: 20px;
    }
    .program-desc p {
      font-size: 0.95rem; line-height: 1.75; color: var(--text);
    }

    /* ── Sign-in button ── */
    .signin-btn {
      display: block; text-align: center; text-decoration: none;
      padding: 15px 28px; border-radius: 12px; margin-bottom: 40px;
      background: linear-gradient(135deg, var(--accent-light), var(--accent-mid));
      color: #fff; font-family: "Cinzel", serif; font-size: 0.88rem;
      letter-spacing: 0.08em; font-weight: 600;
      transition: opacity 0.2s, transform 0.15s;
      box-shadow: 0 4px 16px rgba(148,62,12,0.22);
    }
    .signin-btn:hover { opacity: 0.88; transform: translateY(-2px); }
    .signin-btn:active { transform: translateY(0); }

    /* ── Sessions list ── */
    .sessions-section h2 {
      font-family: "Cinzel", serif; font-size: 1.05rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-mid);
      margin-bottom: 14px;
    }
    .sessions-list {
      display: flex; flex-direction: column; gap: 10px;
    }
    .session-link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; border-radius: 12px; text-decoration: none;
      background: var(--bg-card); border: 1px solid rgba(180,90,45,0.18);
      color: var(--text); font-size: 0.9rem;
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
    }
    .session-link:hover {
      background: rgba(255,255,255,0.7);
      border-color: rgba(148,62,12,0.4);
      transform: translateX(3px);
    }
    .session-link .session-arrow { color: var(--accent-dark); font-size: 0.9rem; }
    .sessions-empty {
      font-size: 0.88rem; color: var(--text-muted); font-style: italic;
      padding: 16px 20px;
    }

    footer {
      margin-top: 52px; font-size: 0.82rem; color: rgba(70,28,4,0.7);
      letter-spacing: 0.1em; text-transform: uppercase; text-align: center;
    }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
